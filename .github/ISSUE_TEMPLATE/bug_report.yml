name: Bug report
description: Something crashes, downloads the wrong thing, or produces wrong output
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail that someone can reproduce it locally.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, what did you actually see?
      placeholder: |
        I ran `insta-dl instagram --dest ./out` and …
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command
      description: Copy-paste the full command (redact tokens with `***`).
      render: bash
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output / traceback
      description: Full stderr and traceback. Redact tokens.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - hiker
        - aiograpi
        - not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: insta-dl version
      placeholder: "0.0.1"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.7"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
