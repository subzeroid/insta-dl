name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Python 3.14 is listed below as an informational target. aiograpi's
    # transitive Rust deps (pydantic-core / jiter / orjson) don't yet
    # support 3.14 — the job will fail at `pip install` until upstream
    # catches up. `continue-on-error` keeps the overall workflow green
    # so we don't suppress real regressions on 3.11–3.13.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pytest --cov=insta_dl --cov-report=term-missing --cov-report=xml --cov-fail-under=90
      - uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
