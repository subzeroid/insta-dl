name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # aiograpi pulls in pydantic-core / orjson (Rust + PyO3); upstream PyO3
  # only declares 3.13 as its maximum. ABI3 forward-compat is the
  # officially-suggested workaround until PyO3 tags a 3.14-aware release.
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pytest --cov=insta_dl --cov-report=term-missing --cov-report=xml --cov-fail-under=90
      - uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
